<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d2e"/>
      <stop offset="100%" style="stop-color:#2d6b46"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="400" fill="url(#bgGradient)"/>
  
  <!-- Circle avatar background -->
  <circle cx="150" cy="140" r="80" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Person silhouette -->
  <g fill="#c9a962">
    <!-- Head -->
    <circle cx="150" cy="120" r="45"/>
    <!-- Body -->
    <path d="M90 180 Q90 170 100 165 L110 165 Q115 170 115 180 L115 280 Q115 295 150 295 Q185 295 185 280 L185 180 Q185 170 190 165 L200 165 Q210 170 210 180 L210 280 Q210 310 150 310 Q90 310 90 280 Z"/>
  </g>
  
  <!-- Professional border effect -->
  <circle cx="150" cy="150" r="95" fill="none" stroke="#c9a962" stroke-width="3" opacity="0.5"/>
</svg>